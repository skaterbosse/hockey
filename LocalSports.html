<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>LocalSport Fotboll v2</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<style>
.top-sticky{
  position:sticky;
  top:0;
  z-index:1100;
  background:#000;
  width:100%;
}
.site-header{
  background:#000;
  width:100%;
  padding:0.2em 0 0.1em 0;
  min-height:var(--logo-h);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.site-header img{
  width:100vw;
  max-width:none;
  height:auto;
  display:block;
}
:root {
  --logo-h:118px;
  --topbar-h:56px;
  --hint-h:28px;
  --slot-h:44px;
  --map-h:260px;
  --bg:#0f172a;
  --panel:#000000;
  --panel2:#1f2937;
  --hair:#334155;
  --text:#f8fafc;
  --muted:#cbd5e1;
  --accent:#22c55e;
  --link:#93c5fd;
  --danger:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
  overscroll-behavior:none;
  color:var(--text);
}
.device{
  display:flex;
  flex-direction:column;
  height:100dvh;
  padding-top:var(--topbar-h);
}

.topbar{
  position:fixed;
  top:calc(var(--logo-h) + 56px);
  left:0;
  right:0;
  z-index:1200;
  background:var(--panel);
  border-bottom:1px solid var(--hair);
}
.topbar-inner{
  min-height:var(--topbar-h);
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:8px;
  padding:6px;
}
.icon-btn{
  width:34px;height:34px;
  display:grid;place-items:center;
  border-radius:10px;
  background:var(--panel2);
  border:1px solid var(--hair);
  cursor:pointer;
  font-size:15px;
  color:var(--text);
}
.header-icon{width:20px;height:20px;object-fit:contain;border-radius:4px;}
.date-box{
  text-align:center;
  font-weight:700;
  font-size:13px;
  line-height:1.15;
}
.date-box small{display:block;color:var(--muted);font-weight:600;margin-top:2px;}
.sort-stack{background:var(--panel);border:1px solid var(--hair);padding:4px;border-radius:10px;}
.sort-top{font-size:12px;font-weight:600;text-align:center;}
.sort-bottom{display:flex;gap:4px;margin-top:2px;}
.pill{
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  border:1px solid var(--hair);
  font-weight:600;
}
.pill.on{background:#14532d;border-color:#22c55e;color:var(--accent);}
.pill.lock{opacity:.65;}
#sortPlaceBtn,#sortSeriesBtn{cursor:pointer;}

body.map-view .map-wrap{top:calc(var(--logo-h) + var(--topbar-h) + var(--hint-h));}
body.map-view #groupSlot{display:none;}
.hint{
  position:sticky;top:calc(var(--logo-h) + var(--topbar-h));
  height:var(--hint-h);
  background:var(--panel);
  border-bottom:1px solid var(--hair);
  line-height:var(--hint-h);
  text-align:center;
  color:var(--muted);
  z-index:1150;
  font-size:13px;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}

.map-wrap{
  position:fixed;
  top:calc(var(--logo-h) + var(--topbar-h) + var(--hint-h));
  left:0;
  right:0;
  bottom:0;
  z-index:820;
  background:rgba(2,6,23,.92);
  display:none;
  padding:12px;
}
.map-wrap.open{display:block;}
.map-panel{
  position:relative;
  height:100%;
  border:1px solid var(--hair);
  border-radius:16px;
  overflow:hidden;
  background:var(--panel);
  box-shadow:0 18px 60px rgba(0,0,0,.45);
}
#map{
  height:100%;
  width:100%;
}
.map-close{display:none;}
.map-control{
  position:absolute;
  top:10px;
  right:10px;
  z-index:700;
  background:var(--panel);
  border:1px solid var(--hair);
  border-radius:10px;
  padding:8px 10px;
  box-shadow:0 2px 8px rgba(15,23,42,.15);
  font-size:13px;
  font-weight:700;
  display:flex;
  gap:7px;
  align-items:center;
}
.map-control input{width:16px;height:16px;}

.group-slot{
  position:sticky;
  top:calc(var(--topbar-h) + var(--hint-h));
  height:var(--slot-h);
  background:var(--panel);
  border-bottom:1px dashed var(--hair);
  z-index:800;
  font-weight:700;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
}
.group-sub{color:var(--muted);font-size:13px;}

.scroll{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

.arena-header{
  display:flex;
  justify-content:space-between;
  background:var(--panel);
  border-bottom:1px dashed var(--hair);
  padding:10px 12px;
  font-weight:700;
}
.arena-header small{
  display:block;
  color:var(--muted);
  font-weight:600;
  margin-top:2px;
}
.arena-header.active-hidden{
  height:0;
  padding:0;
  border:none;
  visibility:hidden;
}

.game{
  background:var(--panel);
  border-top:1px dashed var(--hair);
  padding:8px 12px;
}
.game-top{
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.game-time{font-weight:800;}
.game-series{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--link);
  font-weight:700;
  font-size:13px;
}
.game-bottom{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:8px;
  margin-top:5px;
}
.team{display:flex;align-items:center;gap:6px;min-width:0;}
.team-logo{
  width:26px;height:26px;
  border-radius:50%;
  border:1px solid var(--hair);
  object-fit:cover;
  background:var(--panel2);
  flex:0 0 auto;
}
.team-name{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:13px;
}
.team.home{justify-content:flex-end;}
.result.status-4{
  border:2px solid #d7f379 !important;
}
.result{
  font-weight:800;
  padding:2px 10px;
  border-radius:8px;
  border:1px solid var(--hair);
  background:var(--panel);
  white-space:nowrap;
}
.result.link{color:var(--link);background:#1e3a8a;border-color:#60a5fa;}
.divider{height:7px;background:var(--bg);border-top:1px dashed var(--hair);}
.empty{
  margin:18px;
  padding:18px;
  border-radius:14px;
  border:1px solid var(--hair);
  background:var(--panel);
  color:var(--muted);
  text-align:center;
  font-weight:700;
}
.leaflet-popup-content{font-size:13px;line-height:1.3;}
.field-label{
  background:rgba(0,0,0,.9);
  border:1px solid var(--hair);
  border-radius:4px;
  padding:2px 4px;
  font-size:12px;
  font-weight:700;
  color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.35);
}

.hint{
  z-index:1150 !important;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
body.map-view #groupSlot,
body.map-view .group-slot{
  display:none !important;
}

/* v14.2 minimal fixes */
.hint{
  user-select:none !important;
  -webkit-user-select:none !important;
  -webkit-touch-callout:none !important;
  overscroll-behavior:none !important;
}

body.map-view #groupSlot{
  display:none !important;
}

body.map-view .map-wrap{
  top:calc(var(--logo-h) + 56px + var(--topbar-h) + var(--hint-h)) !important;
}


/* settings-only additions */
.settings-panel{
  position:fixed;
  top:calc(var(--logo-h) + var(--topbar-h) + 8px);
  right:8px;
  z-index:2200;
  display:none;
}
.settings-panel.open{display:block;}
.settings-card{
  min-width:230px;
  background:var(--panel);
  color:var(--text);
  border:1px solid var(--hair);
  border-radius:12px;
  box-shadow:0 12px 30px rgba(0,0,0,.35);
  padding:12px;
  font-size:13px;
  line-height:1.45;
}
.settings-title{font-weight:800;margin-bottom:10px;}
.settings-label{color:var(--muted);font-weight:800;margin-bottom:8px;}
.settings-card label{
  display:block;
  margin:7px 0;
  font-weight:700;
  white-space:nowrap;
}
.settings-card input{margin-right:7px;}
.series-settings{
  border-top:1px solid var(--hair);
  margin-top:12px;
  padding-top:10px;
}
.series-tree{
  max-height:230px;
  overflow-y:scroll;
  scrollbar-gutter:stable;
  border:1px solid var(--hair);
  border-radius:10px;
  padding:8px;
  background:rgba(15,23,42,.55);
  scrollbar-width:auto;
  scrollbar-color:#d7f379 #1f2937;
}
.series-tree::-webkit-scrollbar{
  width:12px;
}
.series-tree::-webkit-scrollbar-track{
  background:#1f2937;
  border-radius:10px;
}
.series-tree::-webkit-scrollbar-thumb{
  background:#d7f379;
  border-radius:10px;
}
.series-node{
  margin:4px 0;
  font-weight:700;
}
.series-node.level-1{margin-left:0;}
.series-node.level-2{margin-left:14px;}
.series-node.level-3{margin-left:28px;}
.series-node.level-4{margin-left:42px;font-weight:500;}
.series-node label{
  display:flex;
  align-items:center;
  gap:6px;
  margin:0;
  white-space:nowrap;
}
.series-node.hidden{display:none;}
.series-expand{
  border:1px solid var(--hair);
  background:var(--panel2);
  color:var(--text);
  border-radius:6px;
  width:22px;
  height:22px;
  font-weight:800;
  line-height:18px;
  cursor:pointer;
  flex:0 0 auto;
}
.series-node input{margin-right:0;}
.series-tree{
  position:relative;
  padding-right:18px;
}
.series-tree::after{
  content:"";
  position:absolute;
  top:8px;
  right:6px;
  width:6px;
  height:calc(100% - 16px);
  border-radius:999px;
  background:#d7f379;
  opacity:.9;
  pointer-events:none;
}


/* header2 fixed-only correction */
.map-wrap{
  top:calc(var(--logo-h) + 56px + var(--topbar-h) + var(--hint-h)) !important;
}
body.map-view .map-wrap{
  top:calc(var(--logo-h) + 56px + var(--topbar-h) + var(--hint-h)) !important;
}
.settings-panel{
  top:calc(var(--logo-h) + 56px + var(--topbar-h) + 8px) !important;
}


/* compact header2 controls */
.topbar{min-height:56px !important;}
.topbar-inner{padding-top:4px !important;padding-bottom:4px !important;min-height:48px !important;}
.icon-btn{width:40px !important;height:40px !important;}
.sort-stack{transform:scale(.92);transform-origin:right center;}
.date-nav{transform:scale(.92);transform-origin:center center;}


/* align header3 below compact fixed header2 */
.hint{
  top:calc(var(--logo-h) + 56px + var(--topbar-h)) !important;
}
.group-slot{
  top:calc(var(--logo-h) + 56px + var(--topbar-h) + var(--hint-h)) !important;
}
.map-wrap,
body.map-view .map-wrap{
  top:calc(var(--logo-h) + 56px + var(--topbar-h) + var(--hint-h)) !important;
}
.settings-panel{
  top:calc(var(--logo-h) + 56px + var(--topbar-h) + 8px) !important;
}


/* map view scroll lock only */
body.map-view{
  overflow:hidden !important;
}
body.map-view .device{
  overflow:hidden !important;
}
body.map-view #scrollArea{
  overflow:hidden !important;
}


/* map view: avoid header3 splitting the map */
body.map-view .hint{
  display:none !important;
}
body.map-view .map-wrap{
  top:calc(var(--logo-h) + 56px + var(--topbar-h)) !important;
}


/* position settings additions */
.settings-select{
  width:100%;
  max-width:100%;
  margin:0 0 10px 0;
  padding:7px;
  border-radius:8px;
  border:1px solid var(--hair);
  background:var(--panel2);
  color:var(--text);
  font-weight:700;
}
body.location-picker-mode .leaflet-marker-icon,
body.location-picker-mode .leaflet-tooltip{
  display:none !important;
}


/* date box update */
.date-box{
  border:1px solid var(--hair);
  border-radius:10px;
  padding:4px 10px;
  min-width:64px;
  background:var(--panel);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.date-rel{
  display:block;
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  line-height:1.05;
  margin-bottom:1px;
}
.date-main{
  display:block;
  color:var(--text);
  font-size:13px;
  font-weight:800;
  line-height:1.05;
}
.date-box small{
  line-height:1.05;
  margin-top:2px;
}


/* fixed-width date box */
.date-box{
  width:72px !important;
  min-width:72px !important;
  max-width:72px !important;
}
.date-rel{
  max-width:100%;
  white-space:nowrap;
  overflow:hidden;
  text-align:center;
}
.date-rel.long{
  font-size:9px !important;
}


/* cluster divider update */
.divider{
  height:3px !important;
  background:#d7f379 !important;
  border-top:none !important;
}


/* dynamic header layout test */
:root{
  --dynamic-header1-bottom: var(--logo-h);
  --dynamic-header2-bottom: calc(var(--logo-h) + var(--topbar-h));
}

.topbar{
  top:var(--dynamic-header1-bottom) !important;
}

.device{
  padding-top:var(--topbar-h) !important;
}

.hint{
  top:var(--dynamic-header2-bottom) !important;
}

.group-slot{
  top:calc(var(--dynamic-header2-bottom) + var(--hint-h)) !important;
}

.map-wrap,
body.map-view .map-wrap{
  top:calc(var(--dynamic-header2-bottom) + var(--hint-h)) !important;
}

body.map-view .map-wrap{
  top:var(--dynamic-header2-bottom) !important;
}

.settings-panel{
  top:calc(var(--dynamic-header2-bottom) + 8px) !important;
}


/* local Mac header2 offset test */
:root{
  --header2-extra-offset: 42px;
}

.topbar{
  top:calc(var(--dynamic-header1-bottom) + var(--header2-extra-offset)) !important;
}

.hint{
  top:var(--dynamic-header2-bottom) !important;
}

.group-slot{
  top:calc(var(--dynamic-header2-bottom) + var(--hint-h)) !important;
}

.map-wrap{
  top:calc(var(--dynamic-header2-bottom) + var(--hint-h)) !important;
}

body.map-view .map-wrap{
  top:var(--dynamic-header2-bottom) !important;
}

.settings-panel{
  top:calc(var(--dynamic-header2-bottom) + 8px) !important;
}


/* v13 header fine tuning */
:root{
  --header2-extra-offset: 52px;
}

body.map-view .map-wrap{
  top:calc(var(--dynamic-header2-bottom) + 8px) !important;
}

.group-slot{
  height:0 !important;
  min-height:0 !important;
  max-height:0 !important;
  padding:0 !important;
  margin:0 !important;
  border:0 !important;
  overflow:hidden !important;
  visibility:hidden !important;
}

.hint{
  position:fixed !important;
  left:0 !important;
  right:0 !important;
  top:var(--dynamic-header2-bottom) !important;
  height:var(--hint-h) !important;
  z-index:1190 !important;
}

.scroll{
  padding-top:var(--hint-h) !important;
}

.map-wrap{
  top:calc(var(--dynamic-header2-bottom) + var(--hint-h)) !important;
}


/* v14 map and header3 correction */
.hint{
  display:block !important;
  position:fixed !important;
  left:0 !important;
  right:0 !important;
  top:var(--dynamic-header2-bottom) !important;
  height:var(--hint-h) !important;
  line-height:var(--hint-h) !important;
  z-index:1210 !important;
  background:var(--panel) !important;
}

.scroll{
  padding-top:0 !important;
  margin-top:var(--hint-h) !important;
}

body.map-view .hint{
  display:none !important;
}

body.map-view .map-wrap{
  top:calc(var(--dynamic-header2-bottom) + 48px) !important;
}

.map-wrap{
  top:calc(var(--dynamic-header2-bottom) + var(--hint-h)) !important;
}


/* v15 move header3 below header2 */
.hint{
  top:calc(var(--dynamic-header2-bottom) + 12px) !important;
}


/* v16 move header3 further down */
.hint{
  top:calc(var(--dynamic-header2-bottom) + 44px) !important;
}


/* v17 restore cluster headers in place view */
.group-slot{
  height:auto !important;
  min-height:0 !important;
  max-height:none !important;
  overflow:visible !important;
  visibility:visible !important;
}


/* v18 move cluster header slightly down */
.group-slot{
  padding-top:18px !important;
}


/* v19 targeted visual fixes */

/* 1) Give the active cluster header a complete black lower edge */
.group-slot{
  padding-top:18px !important;
  padding-bottom:10px !important;
  background:#000000 !important;
}

/* 2) Reduce empty gap between Header 1 and Header 2 on portrait devices */
@media (orientation: portrait){
  :root{
    --header2-extra-offset: 24px;
  }
}


/* v20 portrait refinements */
@media (orientation: portrait){
  :root{
    /* Move Header 2/Header 3 up another step in portrait */
    --header2-extra-offset: 8px;
  }
}

/* iPhone/narrow portrait: reduce Header 1 height by trimming vertical logo area */
@media (orientation: portrait) and (max-width: 600px){
  .site-header{
    min-height:calc(var(--logo-h) * 0.60) !important;
    height:calc(var(--logo-h) * 0.60) !important;
    padding:0 !important;
  }

  .site-header img{
    height:100% !important;
    width:100vw !important;
    object-fit:cover !important;
    object-position:center center !important;
  }
}

/* Try to expose the active cluster header on narrow portrait without affecting tablet/desktop */
@media (orientation: portrait) and (max-width: 600px){
  .group-slot{
    display:flex !important;
    visibility:visible !important;
    height:auto !important;
    min-height:34px !important;
    padding-top:8px !important;
    padding-bottom:8px !important;
    background:#000000 !important;
    z-index:900 !important;
  }
}


/* v21 portrait correction */

/* Move Header 2/Header 3 up in portrait to reduce the gray gap */
@media (orientation: portrait){
  :root{
    --header2-extra-offset: -18px;
  }
}

/* iPhone/narrow portrait: keep full logo width visible, no side clipping */
@media (orientation: portrait) and (max-width: 600px){
  .site-header{
    min-height:calc(var(--logo-h) * 0.68) !important;
    height:calc(var(--logo-h) * 0.68) !important;
    padding:0 !important;
  }

  .site-header img{
    width:100vw !important;
    height:100% !important;
    max-width:none !important;
    object-fit:contain !important;
    object-position:center center !important;
  }
}

/* iPhone/narrow portrait: move cluster header down below Header 3 */
@media (orientation: portrait) and (max-width: 600px){
  .group-slot{
    top:calc(var(--dynamic-header2-bottom) + var(--hint-h) + 42px) !important;
    display:flex !important;
    visibility:visible !important;
    min-height:38px !important;
    padding-top:8px !important;
    padding-bottom:10px !important;
    background:#000000 !important;
  }
}


/* v22 hide match list completely in map view */
body.map-view #scrollArea,
body.map-view #groupSlot,
body.map-view .scroll,
body.map-view .group-slot{
  display:none !important;
}


/* v23 iPhone portrait alignment */
@media (orientation: portrait) and (max-width: 600px){
  :root{
    /* Move Header 2 up about half a sort-box height compared with v22 */
    --header2-extra-offset: -40px;
  }

  /* Move Header 3 up as part of the header block */
  .hint{
    top:calc(var(--dynamic-header2-bottom) - 26px) !important;
  }

  /* Move cluster header up, but keep it below Header 3 */
  .group-slot{
    top:calc(var(--dynamic-header2-bottom) + var(--hint-h) - 28px) !important;
  }

  /* In map view, no Header 3/cluster header is shown, so map can start directly below Header 2 */
  body.map-view .map-wrap{
    top:var(--dynamic-header2-bottom) !important;
  }
}


/* v24 portrait fine tuning */

/* iPhone portrait */
@media (orientation: portrait) and (max-width: 600px){
  /* Move Header 3 + everything below slightly up */
  .hint{
    top:calc(var(--dynamic-header2-bottom) - 38px) !important;
  }

  .group-slot{
    top:calc(var(--dynamic-header2-bottom) + var(--hint-h) - 40px) !important;
  }

  /* Move map up closer to Header 2 */
  body.map-view .map-wrap{
    top:calc(var(--dynamic-header2-bottom) - 30px) !important;
  }
}

/* iPad portrait */
@media (orientation: portrait) and (min-width: 601px) and (max-width: 1200px){
  /* Move Header 2 down on iPad portrait */
  :root{
    --header2-extra-offset: 48px;
  }

function updateDynamicHeaderLayout(){
  const header1 = document.querySelector(".top-sticky");
  const header2 = document.querySelector(".topbar");

  if(!header1 || !header2) return;

  const header1Bottom = Math.ceil(header1.getBoundingClientRect().bottom);
  document.documentElement.style.setProperty("--dynamic-header1-bottom", `${header1Bottom}px`);

  // Vänta en frame så Header 2 hinner flytta sig innan vi mäter dess botten.
  requestAnimationFrame(() => {
    const header2Bottom = Math.ceil(header2.getBoundingClientRect().bottom);
    document.documentElement.style.setProperty("--dynamic-header2-bottom", `${header2Bottom}px`);

    if(window.map && typeof map.invalidateSize === "function"){
      map.invalidateSize();
    }
  });
}

window.addEventListener("resize", updateDynamicHeaderLayout);

<script>
const DATA_URL = "./data/football_games.csv";
const CLUSTER_URL = "./data/FootballClustersEnhanced.csv";
const SERIES_RANKING_URL = "./data/FootballSeriesRanking.csv";

// Default aktuell plats: Gamla Ullevi
const CURRENT_LOCATION = {
  name: "Gamla Ullevi",
  lat: 57.706411,
  lon: 11.980905
};

const REQUIRED = {
  date: "Datum",
  time: "Klockslag",
  seriesMatchAssId: "Serie_Match_AssId",
  series: "SerieNamn",
  seriesId: "SerieId",
  seriesGenderId: "SerieKönId",
  seriesAgeId: "ÅldersKatId",
  matchId: "MatchId",
  status: "MatchStatus",
  matchUrl: "MatchUrl",
  homeName: "HemmalagNamn",
  homeLogo: "HemmalagLogoUrl",
  awayName: "BortalagNamn",
  awayLogo: "BortalagLogoUrl",
  result: "MatchResultat",
  arenaName: "ArenaNamn",
  cluster: "ArenaKluster",
  address: "ArenaKlusterAdress",
  safe: "SäkerMapping",
  lat: "LS_Lat",
  lon: "LS_Long"
};

let allGames = [];
let allDates = [];
let sortMode = "place";
let seriesRanking = new Map();
let seriesRankingByName = new Map();
const SETTINGS_SERIES_FILTER_KEY = "localsport_football_series_filter_v1";
let seriesFilterOff = new Set();
let seriesExpanded = new Set();
let selectedDate = "";
let currentArena = "";
let map = null;
let currentMarker = null;
let maxDistanceRing = null;
let arenaLayer = null;
let locationPickerCircle = null;
let locationPickerActive = false;
let clusterLocations = [];
let arenaHeaders = [];
let lastScrollTop = 0;

const scroll = document.getElementById("scrollArea");
const slot = document.getElementById("groupSlot");
const showAllArenas = document.getElementById("showAllArenas");

const SETTINGS_MAX_DISTANCE_KEY = "localsport_football_max_distance_km";
let maxDistanceKm = Number(localStorage.getItem(SETTINGS_MAX_DISTANCE_KEY) || "999999");

function distanceAllowed(game){
  if(maxDistanceKm >= 999999) return true;
  return haversineKm(CURRENT_LOCATION.lat, CURRENT_LOCATION.lon, game.lat, game.lon) <= maxDistanceKm;
}

function visibleGamesForSelectedDate(){
  return allGames.filter(g => g.date === selectedDate && distanceAllowed(g));
}

function gameDistanceKm(game){
  return haversineKm(CURRENT_LOCATION.lat, CURRENT_LOCATION.lon, game.lat, game.lon);
}

function syncSettingsPanel(){
  document.querySelectorAll('input[name="maxDistanceKm"]').forEach(input => {
    input.checked = Number(input.value) === Number(maxDistanceKm);
  });
}

const SETTINGS_LOCATION_KEY = "localsport_football_location_v1";
const DEFAULT_LOCATION = {
  type: "default",
  name: "Gamla Ullevi",
  lat: 57.706411,
  lon: 11.980905
};

function loadLocationSetting(){
  try{
    return JSON.parse(localStorage.getItem(SETTINGS_LOCATION_KEY) || "null") || DEFAULT_LOCATION;
  } catch(_err){
    return DEFAULT_LOCATION;
  }
}

function saveLocationSetting(value){
  localStorage.setItem(SETTINGS_LOCATION_KEY, JSON.stringify(value));
}

function applyCurrentLocation(value){
  CURRENT_LOCATION.name = value.name || "Min plats";
  CURRENT_LOCATION.lat = Number(value.lat);
  CURRENT_LOCATION.lon = Number(value.lon);

  if(currentMarker){
    currentMarker.setLatLng([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon]);
    currentMarker.bindPopup(`<b>${escapeHtml(CURRENT_LOCATION.name)}</b><br>Aktuell plats`);
  }

  updateMaxDistanceRing();
}

function updateMaxDistanceRing(){
  if(!map) return;

  if(maxDistanceRing){
    map.removeLayer(maxDistanceRing);
    maxDistanceRing = null;
  }

  if(maxDistanceKm >= 999999) return;

  maxDistanceRing = L.circle([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon], {
    radius: maxDistanceKm * 1000,
    color: "#dc2626",
    fillOpacity: 0,
    weight: 2
  }).addTo(map);
}


function looksLikeCoordinates(value){
  return /^\s*-?\d+(?:[.,]\d+)?\s*,\s*-?\d+(?:[.,]\d+)?\s*$/.test(String(value || ""));
}

function parseClusterCoordinate(value){
  const parts = String(value || "").split(",");
  if(parts.length < 2) return null;

  const lat = Number(parts[0].trim().replace(",", "."));
  const lon = Number(parts[1].trim().replace(",", "."));

  if(!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
  return {lat, lon};
}

async function buildLocationOptions(){
  const byCluster = new Map();

  console.info(`[LocalSport] Läser fotbollskluster från ${CLUSTER_URL}`);

  try{
    const response = await fetch(CLUSTER_URL, { cache:"no-store" });
    console.info(`[LocalSport] ${CLUSTER_URL} status=${response.status} ok=${response.ok}`);

    if(response.ok){
      const text = await response.text();
      console.info(`[LocalSport] ${CLUSTER_URL} bytes=${text.length}`);

      const rows = parseCSV(text);
      console.info(`[LocalSport] ${CLUSTER_URL} rader=${rows.length}`);

      let parsedRows = 0;
      let skippedRows = 0;

      for(const row of rows){
        if(!row || row.length < 3){
          skippedRows++;
          continue;
        }

        // Stöd båda formaten:
        // 1) assIdLista;klusternamn;koordinater;adress;...
        // 2) assIdLista;?;klusternamn;koordinater;adress;...
        let clusterName = "";
        let coordText = "";
        let address = "";

        if(looksLikeCoordinates(row[2])){
          clusterName = (row[1] || "").trim();
          coordText = (row[2] || "").trim();
          address = (row[3] || "").trim();
        } else if(looksLikeCoordinates(row[3])){
          clusterName = (row[2] || "").trim();
          coordText = (row[3] || "").trim();
          address = (row[4] || "").trim();
        } else {
          skippedRows++;
          continue;
        }

        const coord = parseClusterCoordinate(coordText);
        if(!clusterName || !coord){
          skippedRows++;
          continue;
        }

        if(!byCluster.has(clusterName)){
          byCluster.set(clusterName, {
            type: "cluster",
            name: clusterName,
            lat: coord.lat,
            lon: coord.lon,
            address
          });
          parsedRows++;
        }
      }

      console.info(`[LocalSport] Kluster från fil: ${byCluster.size}, parsade=${parsedRows}, hoppade över=${skippedRows}`);
    }
  } catch(err){
    console.warn(`[LocalSport] Kunde inte läsa ${CLUSTER_URL}`, err);
  }

  if(byCluster.size === 0){
    console.warn("[LocalSport] Inga kluster kunde läsas från FootballClustersEnhanced.csv, använder fallback från football_games.csv");

    for(const game of allGames){
      if(!game.cluster || !Number.isFinite(game.lat) || !Number.isFinite(game.lon)) continue;

      if(!byCluster.has(game.cluster)){
        byCluster.set(game.cluster, {
          type: "cluster",
          name: game.cluster,
          lat: game.lat,
          lon: game.lon,
          address: game.address || ""
        });
      }
    }

    console.info(`[LocalSport] Fallback-kluster från matcher: ${byCluster.size}`);
  }

  clusterLocations = [...byCluster.values()].sort((a,b) => a.name.localeCompare(b.name, "sv"));

  const select = document.getElementById("locationSetting");
  if(!select) return;

  const saved = loadLocationSetting();
  const options = [
    `<option value="__default__">Gamla Ullevi</option>`,
    `<option value="__map__">Välj plats på kartan</option>`
  ];

  if(saved.type === "custom"){
    options.push(`<option value="__custom__">Min plats</option>`);
  }

  for(const item of clusterLocations){
    options.push(`<option value="${escapeHtml(item.name)}">${escapeHtml(item.name)}</option>`);
  }

  select.innerHTML = options.join("");

  if(saved.type === "map"){
    select.value = "__map__";
  } else if(saved.type === "custom"){
    select.value = "__custom__";
    applyCurrentLocation(saved);
  } else if(saved.type === "cluster"){
    const found = clusterLocations.find(item => item.name === saved.name);
    if(found){
      select.value = found.name;
      applyCurrentLocation(found);
    } else {
      select.value = "__default__";
      applyCurrentLocation(DEFAULT_LOCATION);
    }
  } else {
    select.value = "__default__";
    applyCurrentLocation(DEFAULT_LOCATION);
  }

  console.info(`[LocalSport] Positionslista klar: ${clusterLocations.length} kluster`);
}

function isLocationPickerSelected(){
  const select = document.getElementById("locationSetting");
  return select && select.value === "__map__";
}

function setNormalMapControl(){
  const label = document.querySelector(".map-control span");
  if(label) label.textContent = "Visa alla Arenor";
  showAllArenas.checked = false;
}

function setLocationPickerMapControl(){
  const label = document.querySelector(".map-control span");
  if(label) label.textContent = "Spara platsen";
  showAllArenas.checked = false;
}

function updateLocationPickerCircle(){
  if(!map || !locationPickerActive) return;

  const center = map.getCenter();
  if(!locationPickerCircle){
    locationPickerCircle = L.circle([center.lat, center.lng], {
      radius: 450,
      color: "#dc2626",
      fillColor: "#dc2626",
      fillOpacity: 0.25,
      weight: 3
    }).addTo(map);
  } else {
    locationPickerCircle.setLatLng([center.lat, center.lng]);
  }
}

function startLocationPickerMap(){
  if(!map) return;

  locationPickerActive = true;
  document.body.classList.add("location-picker-mode");
  setLocationPickerMapControl();

  if(arenaLayer) arenaLayer.clearLayers();
  if(currentMarker && map.hasLayer(currentMarker)) map.removeLayer(currentMarker);

  map.setMaxBounds([[55.0, 10.0], [69.5, 25.0]]);
  map.setMinZoom(4);

  updateLocationPickerCircle();
  map.off("move", updateLocationPickerCircle);
  map.on("move", updateLocationPickerCircle);
}

function stopLocationPickerMap(){
  locationPickerActive = false;
  document.body.classList.remove("location-picker-mode");
  if(map) map.off("move", updateLocationPickerCircle);

  if(locationPickerCircle){
    map.removeLayer(locationPickerCircle);
    locationPickerCircle = null;
  }

  if(map && currentMarker && !map.hasLayer(currentMarker)){
    currentMarker.addTo(map);
  }

  setNormalMapControl();
}

function saveLocationFromMapCenter(){
  if(!map) return;

  const center = map.getCenter();
  const value = {
    type: "custom",
    name: "Min plats",
    lat: center.lat,
    lon: center.lng
  };

  saveLocationSetting(value);
  applyCurrentLocation(value);
  buildLocationOptions();

  stopLocationPickerMap();

  const games = visibleGamesForSelectedDate();
  const arenas = groupByArena(games);
  renderList(arenas);
  renderMap(arenas, false);
  updateHint(games, arenas);
}

function refreshOpenMapAfterLocationSettingChange(){
  if(!document.body.classList.contains("map-view") || !map){
    return;
  }

  setTimeout(() => {
    map.invalidateSize();

    if(isLocationPickerSelected()){
      startLocationPickerMap();
    } else {
      stopLocationPickerMap();
      const games = visibleGamesForSelectedDate();
      const arenas = groupByArena(games);
      renderMap(arenas, true);
    }
  }, 50);
}


function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let quote = false;

  for(let i=0; i<text.length; i++){
    const ch = text[i];
    const next = text[i+1];

    if(ch === '"' && quote && next === '"'){
      cell += '"';
      i++;
    } else if(ch === '"'){
      quote = !quote;
    } else if(ch === ";" && !quote){
      row.push(cell);
      cell = "";
    } else if((ch === "\n" || ch === "\r") && !quote){
      if(ch === "\r" && next === "\n") i++;
      row.push(cell);
      if(row.some(v => v.trim() !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  if(cell.length || row.length){
    row.push(cell);
    if(row.some(v => v.trim() !== "")) rows.push(row);
  }

  return rows;
}

function seriesRankKeyFromValues(series, genderId, ageId, assId){
  return [
    String(series || "").trim(),
    String(genderId || "").trim(),
    String(ageId || "").trim(),
    String(assId || "").trim()
  ].join(";");
}

function seriesRankKey(game){
  return seriesRankKeyFromValues(game.series, game.seriesGenderId, game.seriesAgeId, game.seriesMatchAssId);
}

async function loadSeriesRanking(){
  seriesRanking = new Map();
  seriesRankingByName = new Map();

  try{
    const response = await fetch(SERIES_RANKING_URL, { cache:"no-store" });
    if(!response.ok){
      console.warn(`[LocalSport] Kunde inte läsa ${SERIES_RANKING_URL}: ${response.status}`);
      return;
    }

    const text = await response.text();
    const rows = parseCSV(text);
    if(!rows.length) return;

    const header = rows[0].map(h => h.trim());
    const index = Object.fromEntries(header.map((h,i) => [h,i]));

    function col(row, name){
      const i = index[name];
      return i === undefined ? "" : (row[i] || "").trim();
    }

    for(const row of rows.slice(1)){
      const series = col(row, "SeriePattern");
      if(!series) continue;

      const item = {
        series,
        rank: Number(col(row, "Rank") || "0"),
        category: col(row, "Kategori"),
        gender: col(row, "Kön"),
        level: col(row, "Nivå"),
        genderId: col(row, "SerieKönId"),
        ageId: col(row, "ÅldersKatId"),
        assId: col(row, "Serie_Match_AssId")
      };

      seriesRanking.set(seriesRankKeyFromValues(series, item.genderId, item.ageId, item.assId), item);

      if(!seriesRankingByName.has(series) || item.rank > seriesRankingByName.get(series).rank){
        seriesRankingByName.set(series, item);
      }
    }

    console.info(`[LocalSport] Läste ${seriesRanking.size} serierankningar från ${SERIES_RANKING_URL}`);
  } catch(err){
    console.warn(`[LocalSport] Kunde inte läsa ${SERIES_RANKING_URL}`, err);
  }
}

function getSeriesRanking(game){
  return seriesRanking.get(seriesRankKey(game)) ||
         seriesRankingByName.get(game.series) ||
         { rank: 0, category: "", gender: "", level: "" };
}

function groupBySeries(games){
  const map = new Map();

  for(const game of games){
    const ranking = getSeriesRanking(game);
    const key = game.series || "Okänd serie";

    if(!map.has(key)){
      map.set(key, {
        name: key,
        rank: Number(ranking.rank || 0),
        meta: [ranking.category, ranking.gender, ranking.level].filter(Boolean).join(" · "),
        games: []
      });
    }

    map.get(key).games.push(game);
  }

  return [...map.values()]
    .sort((a,b) => b.rank - a.rank || a.name.localeCompare(b.name, "sv"));
}

function updateSortPills(){
  document.getElementById("sortPlaceBtn")?.classList.toggle("on", sortMode === "place");
  document.getElementById("sortSeriesBtn")?.classList.toggle("on", sortMode === "series");
}

function seriesUiCategory(category){
  if(category === "Motion" || category === "Övrigt") return "Rekreation";
  return category || "Övrigt";
}

function seriesUiGender(gender){
  if(gender === "Herr") return "Man/Pojk";
  if(gender === "Dam") return "Dam/Flick";
  return gender || "Mix";
}

function loadSeriesFilterSettings(){
  try{
    const saved = JSON.parse(localStorage.getItem(SETTINGS_SERIES_FILTER_KEY) || "{}");
    seriesFilterOff = new Set(Array.isArray(saved.off) ? saved.off : []);
  } catch(_err){
    seriesFilterOff = new Set();
  }
}

function saveSeriesFilterSettings(){
  localStorage.setItem(SETTINGS_SERIES_FILTER_KEY, JSON.stringify({
    off: [...seriesFilterOff].sort()
  }));
}

function pathKey(parts){
  return parts.filter(Boolean).join("/");
}

function isSeriesPathEnabled(parts){
  for(let i=1; i<=parts.length; i++){
    if(seriesFilterOff.has(pathKey(parts.slice(0,i)))) return false;
  }
  return true;
}

function removeSeriesOffPathAndChildren(key){
  for(const item of [...seriesFilterOff]){
    if(item === key || item.startsWith(`${key}/`)){
      seriesFilterOff.delete(item);
    }
  }
}

function setSeriesPathEnabled(parts, enabled){
  const key = pathKey(parts);
  if(!key) return;

  if(enabled){
    removeSeriesOffPathAndChildren(key);
  } else {
    removeSeriesOffPathAndChildren(key);
    seriesFilterOff.add(key);
  }

  saveSeriesFilterSettings();
  buildSeriesSettingsTree();
  render();
}

function seriesFilterPartsForRanking(ranking){
  return [
    ranking.level || "Övrigt",
    seriesUiCategory(ranking.category),
    seriesUiGender(ranking.gender)
  ];
}

function seriesFilterAllowsGame(game){
  const ranking = getSeriesRanking(game);
  const parts = [
    ...seriesFilterPartsForRanking(ranking),
    game.series || "Okänd serie"
  ];
  return isSeriesPathEnabled(parts);
}

function buildSeriesSettingsTree(){
  const root = document.getElementById("seriesSettingsTree");
  if(!root) return;

  const firstBuild = seriesExpanded.size === 0;
  const tree = new Map();

  for(const item of seriesRanking.values()){
    const parts = seriesFilterPartsForRanking(item);
    const [level, category, gender] = parts;

    if(!tree.has(level)) tree.set(level, new Map());
    if(!tree.get(level).has(category)) tree.get(level).set(category, new Map());
    if(!tree.get(level).get(category).has(gender)) tree.get(level).get(category).set(gender, new Set());
    tree.get(level).get(category).get(gender).add(item.series);
  }

  const levelOrder = ["Nationell", "Regional", "Lokal", "Övrigt"];
  const categoryOrder = ["Senior", "Junior", "Ungdom", "Barn", "Rekreation", "Övrigt"];
  const genderOrder = ["Man/Pojk", "Dam/Flick", "Mix"];

  function sortByOrder(values, order){
    return [...values].sort((a,b) => {
      const ia = order.indexOf(a);
      const ib = order.indexOf(b);
      return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib) || a.localeCompare(b, "sv");
    });
  }

  if(firstBuild){
    for(const level of tree.keys()){
      seriesExpanded.add(pathKey([level]));
      for(const category of tree.get(level).keys()){
        seriesExpanded.add(pathKey([level, category]));
      }
    }
  }

  const htmlParts = [];

  for(const level of sortByOrder(tree.keys(), levelOrder)){
    const levelParts = [level];
    htmlParts.push(seriesTreeNodeHtml(levelParts, level, 1, "", true));

    for(const category of sortByOrder(tree.get(level).keys(), categoryOrder)){
      const categoryParts = [level, category];
      htmlParts.push(seriesTreeNodeHtml(categoryParts, category, 2, pathKey(levelParts), true));

      for(const gender of sortByOrder(tree.get(level).get(category).keys(), genderOrder)){
        const genderParts = [level, category, gender];
        htmlParts.push(seriesTreeNodeHtml(genderParts, gender, 3, pathKey(categoryParts), true));

        const seriesList = [...tree.get(level).get(category).get(gender)]
          .sort((a,b) => a.localeCompare(b, "sv"));

        for(const series of seriesList){
          const seriesParts = [level, category, gender, series];
          htmlParts.push(seriesTreeNodeHtml(seriesParts, series, 4, pathKey(genderParts), false));
        }
      }
    }
  }

  root.innerHTML = htmlParts.join("");

  root.querySelectorAll("input[data-series-path]").forEach(input => {
    input.addEventListener("change", () => {
      setSeriesPathEnabled(input.dataset.seriesPath.split("/"), input.checked);
    });
  });

  root.querySelectorAll("button[data-expand-path]").forEach(button => {
    button.addEventListener("click", (ev) => {
      ev.preventDefault();
      ev.stopPropagation();

      const key = button.dataset.expandPath;
      if(seriesExpanded.has(key)){
        seriesExpanded.delete(key);
      } else {
        seriesExpanded.add(key);
      }

      buildSeriesSettingsTree();
    });
  });
}

function seriesTreeNodeHtml(parts, label, level, parentKey="", hasChildren=false){
  const enabled = isSeriesPathEnabled(parts);
  const key = pathKey(parts);
  const hidden = parentKey && !seriesExpanded.has(parentKey);
  const expanded = seriesExpanded.has(key);
  const expandBtn = hasChildren
    ? `<button type="button" class="series-expand" data-expand-path="${escapeHtml(key)}">${expanded ? "−" : "+"}</button>`
    : "";

  return `
    <div class="series-node level-${level}${hidden ? " hidden" : ""}" data-parent-path="${escapeHtml(parentKey)}">
      <label>
        <input type="checkbox" data-series-path="${escapeHtml(key)}" ${enabled ? "checked" : ""}>
        ${expandBtn}
        <span>${escapeHtml(label)}</span>
      </label>
    </div>
  `;
}

function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtKm(km){
  if(km < 1) return `${Math.round(km*1000)} m`;
  if(km < 10) return `${km.toFixed(1)} km`;
  return `${Math.round(km)} km`;
}

function fmtDate(dateStr){
  const d = new Date(`${dateStr}T12:00:00`);
  if(Number.isNaN(d.getTime())) return {main: dateStr, sub: ""};

  const weekdays = ["Sön","Mån","Tis","Ons","Tors","Fre","Lör"];
  const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];

  return {
    main: weekdays[d.getDay()],
    sub: `${d.getDate()} ${months[d.getMonth()]}`
  };
}

function fmtRelativeDate(dateStr){
  const selected = new Date(`${dateStr}T12:00:00`);
  const today = new Date();
  const todayNoon = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 12, 0, 0);

  if(Number.isNaN(selected.getTime())) return "";

  const diffDays = Math.round((selected - todayNoon) / (24 * 60 * 60 * 1000));

  if(diffDays === 0) return "Idag";
  if(diffDays === -1) return "Igår";
  if(diffDays === 1) return "Imorgon";
  if(diffDays < 0) return `Dag ${diffDays}`;
  return `Dag +${diffDays}`;
}

function absoluteUrl(url){
  if(!url) return "#";
  if(url.startsWith("http://") || url.startsWith("https://")) return url;
  if(url.startsWith("/")) return "https://www.gbgfotboll.se" + url;
  return url;
}

function logo(url){
  const safe = url || "";
  return safe ? `<img class="team-logo" src="${escapeHtml(safe)}" onerror="this.style.visibility='hidden'">` : `<span class="team-logo"></span>`;
}

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

function displayResult(result){
  const value = String(result || "").trim();
  if(!value || value === "-1--1" || value === "-1 - -1") return "–";
  if(value === "0-0" || value === "0 - 0") return "–";
  return value;
}

function groupByArena(games){
  const map = new Map();

  for(const game of games){
    const key = game.cluster || game.arenaName || "Okänd arena";
    if(!map.has(key)){
      const dist = haversineKm(CURRENT_LOCATION.lat, CURRENT_LOCATION.lon, game.lat, game.lon);
      map.set(key, {
        name: key,
        address: game.address,
        lat: game.lat,
        lon: game.lon,
        dist,
        games: []
      });
    }
    map.get(key).games.push(game);
  }

  return [...map.values()]
    .sort((a,b) => a.dist - b.dist || a.name.localeCompare(b.name, "sv"));
}

function render(){
  const {main, sub} = fmtDate(selectedDate);
  const dateRelLabel = document.getElementById("dateRelLabel");
  const relText = fmtRelativeDate(selectedDate);
  dateRelLabel.textContent = relText;
  dateRelLabel.classList.toggle("long", relText.length > 6);
  document.getElementById("dateLabel").textContent = main;
  document.getElementById("dateSubLabel").textContent = sub;
  updateSortPills();

  const games = visibleGamesForSelectedDate()
    .sort((a,b) => gameDistanceKm(a) - gameDistanceKm(b) || a.time.localeCompare(b.time));

  const displayGames = sortMode === "series"
    ? games.filter(seriesFilterAllowsGame)
    : games;

  const arenas = groupByArena(displayGames);

  if(sortMode === "series"){
    const seriesGroups = groupBySeries(displayGames);
    renderSeriesList(seriesGroups);
  } else {
    renderList(arenas);
  }

  renderMap(arenas);
  updateHint(displayGames, arenas);
}


function openArenaOnMap(arenaName){
  const games = visibleGamesForSelectedDate();
  const arenas = groupByArena(games);
  const arena = arenas.find(a => a.name === arenaName);

  if(!arena || !Number.isFinite(arena.lat) || !Number.isFinite(arena.lon)){
    return;
  }

  document.body.classList.add("map-view");
  document.getElementById("mapWrap").classList.add("open");

      map.invalidateSize();
      renderMap(arenas, true);
      map.setView([arena.lat, arena.lon], Math.max(map.getZoom(), 15), {animate:false});
    }
  }, 50);
}

function updateStickyArena(){
  if(!arenaHeaders.length) return;

  const st = scroll.scrollTop;
  const dir = (st > lastScrollTop) ? "down" : "up";
  lastScrollTop = st;

  const stickyBottom = slot.getBoundingClientRect().bottom;
  let active = arenaHeaders[0];

  for(const hdr of arenaHeaders){
    if(hdr.getBoundingClientRect().top <= stickyBottom + 1){
      active = hdr;
    }
  }

  const arenaName = active.dataset.arenaHeader;
  if(arenaName && arenaName !== currentArena){
    currentArena = arenaName;
    const sub = active.querySelector("div:last-child")?.textContent || "";
    slot.querySelector(".group-title").textContent = arenaName;
    slot.querySelector(".group-sub").textContent = sub;
  }
}

function initMap(){
  map = L.map("map", { zoomControl:true }).setView([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon], 11);
  map.setMaxBounds([[55.0, 10.0], [69.5, 25.0]]);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {

  }).addTo(map);

  currentMarker = L.circle([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon], {
    radius: 450,
    color: "#dc2626",
    fillColor: "#dc2626",
    fillOpacity: 0.25,
    weight: 3
  }).addTo(map).bindPopup(`<b>${CURRENT_LOCATION.name}</b><br>Aktuell plats`);

  arenaLayer = L.markerClusterGroup({
    showCoverageOnHover:false,

  }).addTo(map);

function allKnownArenas(){
  const byCluster = new Map();

  for(const game of allGames){
    if(!game.cluster || !Number.isFinite(game.lat) || !Number.isFinite(game.lon)) continue;

    if(!byCluster.has(game.cluster)){
      byCluster.set(game.cluster, {
        name: game.cluster,
        address: game.address,
        lat: game.lat,
        lon: game.lon,
        active: false,
        games: 0
      });
    }
  }

  return [...byCluster.values()];
}


function goToArenaFromMap(arenaName){
  document.body.classList.remove("map-view");
  document.getElementById("mapWrap").classList.remove("open");

  setTimeout(() => {
    const hdr = [...scroll.querySelectorAll(".arena-header")]
      .find(x => x.dataset.arenaHeader === arenaName);

    if(hdr){
      const scrollRect = scroll.getBoundingClientRect();
      const hdrRect = hdr.getBoundingClientRect();
      const targetTop = scroll.scrollTop + hdrRect.top - scrollRect.top;

      scroll.scrollTo({
        top: Math.max(0, targetTop),
        behavior: "smooth"
      });
    }
  }, 80);
}


function renderMap(activeArenas, preserveView=false){
  if(!map || locationPickerActive) return;

  const previousCenter = map.getCenter();
  const previousZoom = map.getZoom();

  arenaLayer.clearLayers();
  updateMaxDistanceRing();

  const activeNames = new Set(activeArenas.map(a => a.name));
  const showAll = showAllArenas.checked;

  const arenas = showAll
    ? allKnownArenas().map(a => ({...a, active: activeNames.has(a.name)}))
    : activeArenas.map(a => ({...a, active:true, games:a.games.length}));

  const bounds = [[CURRENT_LOCATION.lat, CURRENT_LOCATION.lon]];

  for(const arena of arenas){
    if(!Number.isFinite(arena.lat) || !Number.isFinite(arena.lon)) continue;

    const color = arena.active ? "#16a34a" : "#64748b";
    const fillOpacity = arena.active ? 0.85 : 0.35;

    const marker = L.circleMarker([arena.lat, arena.lon], {
      radius: arena.active ? 7 : 5,
      color,
      fillColor: color,
      fillOpacity,
      weight: 2
    });

    const dist = fmtKm(haversineKm(CURRENT_LOCATION.lat, CURRENT_LOCATION.lon, arena.lat, arena.lon));
    const activeArenaInfo = activeArenas.find(a => a.name === arena.name);
    const gameCount = activeArenaInfo ? activeArenaInfo.games.length : 0;

    const gamesText = gameCount > 0
      ? `<br>${gameCount} matcher valt datum<br><a href="#" onclick="goToArenaFromMap('${String(arena.name).replace(/'/g,"\\'")}');return false;">Visa matcher i listan</a>`
      : `<br>Ingen match valt datum`;

    marker.bindPopup(`
      <b>${escapeHtml(arena.name)}</b><br>
      ${escapeHtml(arena.address || "")}<br>
      Avstånd: ${dist}
      ${gamesText}
    `);

    marker.bindTooltip(arena.name, {
      permanent:true,
      direction:"right",
      offset:[8,0],
      className:"field-label"
    });

    marker.addTo(arenaLayer);
    bounds.push([arena.lat, arena.lon]);
  }

  if(preserveView){
    map.setView(previousCenter, previousZoom, { animate:false });
  } else {
    map.setView([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon], 11, { animate:false });
  }
}

async function loadGames(){
  const response = await fetch(DATA_URL, { cache:"no-store" });
  if(!response.ok) throw new Error(`Kunde inte läsa ${DATA_URL}: ${response.status}`);

  const text = await response.text();
  const rows = parseCSV(text);

  if(!rows.length) throw new Error("football_games.csv är tom");

  const header = rows[0].map(h => h.trim());
  const index = Object.fromEntries(header.map((h,i) => [h,i]));

  function col(row, name){
    const i = index[name];
    return i === undefined ? "" : (row[i] || "").trim();
  }

  allGames = rows.slice(1).map(row => {
    const lat = Number(col(row, REQUIRED.lat).replace(",", "."));
    const lon = Number(col(row, REQUIRED.lon).replace(",", "."));

    return {
      date: col(row, REQUIRED.date),
      time: col(row, REQUIRED.time),
      seriesMatchAssId: col(row, REQUIRED.seriesMatchAssId),
      series: col(row, REQUIRED.series),
      seriesId: col(row, REQUIRED.seriesId),
      seriesGenderId: col(row, REQUIRED.seriesGenderId),
      seriesAgeId: col(row, REQUIRED.seriesAgeId),
      matchId: col(row, REQUIRED.matchId),
      status: col(row, REQUIRED.status),
      matchUrl: col(row, REQUIRED.matchUrl),
      homeName: col(row, REQUIRED.homeName),
      homeLogo: col(row, REQUIRED.homeLogo),
      awayName: col(row, REQUIRED.awayName),
      awayLogo: col(row, REQUIRED.awayLogo),
      result: col(row, REQUIRED.result),
      arenaName: col(row, REQUIRED.arenaName),
      cluster: col(row, REQUIRED.cluster),
      address: col(row, REQUIRED.address),
      safe: col(row, REQUIRED.safe),
      lat,
      lon
    };
  }).filter(g =>
    g.date &&
    g.time &&
    g.cluster &&
    Number.isFinite(g.lat) &&
    Number.isFinite(g.lon)
  );

  allDates = [...new Set(allGames.map(g => g.date))].sort();

  const today = new Date().toISOString().slice(0,10);
  selectedDate = allDates.includes(today) ? today : (allDates[0] || "");

  if(!selectedDate){
    throw new Error("Inga matcher med datum hittades");
  }
}

document.getElementById("locationSetting").addEventListener("change", (ev) => {
  const value = ev.target.value;

  if(value === "__map__"){
    // Spara inte över den senast fungerande platsen förrän användaren klickar "Spara platsen".
    refreshOpenMapAfterLocationSettingChange();
    return;
  }

  if(value === "__default__"){
    saveLocationSetting(DEFAULT_LOCATION);
    applyCurrentLocation(DEFAULT_LOCATION);
    render();
    refreshOpenMapAfterLocationSettingChange();
    return;
  }

  if(value === "__custom__"){
    const saved = loadLocationSetting();
    applyCurrentLocation(saved);
    render();
    refreshOpenMapAfterLocationSettingChange();
    return;
  }

  const cluster = clusterLocations.find(item => item.name === value);
  if(cluster){
    const saved = {
      type: "cluster",
      name: cluster.name,
      lat: cluster.lat,
      lon: cluster.lon,
      address: cluster.address || ""
    };
    saveLocationSetting(saved);
    applyCurrentLocation(saved);
    render();
    refreshOpenMapAfterLocationSettingChange();
  }
});

document.getElementById("settingsBtn").addEventListener("click", (ev) => {
  ev.preventDefault();
  ev.stopPropagation();
  syncSettingsPanel();
  const panel = document.getElementById("settingsPanel");
  panel.classList.toggle("open");
  panel.setAttribute("aria-hidden", panel.classList.contains("open") ? "false" : "true");
});

document.getElementById("settingsPanel").addEventListener("click", (ev) => {
  ev.stopPropagation();
});

document.addEventListener("click", () => {
  const panel = document.getElementById("settingsPanel");
  panel.classList.remove("open");
  panel.setAttribute("aria-hidden", "true");
});

document.querySelectorAll('input[name="maxDistanceKm"]').forEach(input => {
  input.addEventListener("change", () => {
    maxDistanceKm = Number(input.value);
    localStorage.setItem(SETTINGS_MAX_DISTANCE_KEY, String(maxDistanceKm));
    updateMaxDistanceRing();
    document.getElementById("settingsPanel").classList.remove("open");
    render();
  });
});

syncSettingsPanel();

showAllArenas.addEventListener("change", () => {
  if(locationPickerActive){
    saveLocationFromMapCenter();
    return;
  }

  const games = visibleGamesForSelectedDate();
  const arenas = groupByArena(games);
  renderMap(arenas, true);
});
scroll.addEventListener("scroll", updateStickyArena, { passive:true });

(async function boot(){
  try{
    initMap();
    await loadGames();
    await loadSeriesRanking();
    loadSeriesFilterSettings();
    buildSeriesSettingsTree();
    await buildLocationOptions();
    render();
  } catch(err){
    console.error(err);
    document.getElementById("hint").textContent = "Kunde inte läsa football_games.csv";
    scroll.innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
    slot.querySelector(".group-title").textContent = "Fel";
    slot.querySelector(".group-sub").textContent = "";
  }
})();
</script>
</body>
</html>
