<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>LocalSport Fotboll v2</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

<style>
.top-sticky{
  position:sticky;
  top:0;
  z-index:1100;
  background:#000;
  width:100%;
}
.site-header{
  background:#000;
  width:100%;
  padding:0.2em 0 0.1em 0;
  min-height:var(--logo-h);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.site-header img{
  width:100vw;
  max-width:none;
  height:auto;
  display:block;
}
:root {
  --logo-h:118px;
  --topbar-h:56px;
  --hint-h:28px;
  --slot-h:44px;
  --map-h:260px;
  --bg:#0f172a;
  --panel:#000000;
  --panel2:#1f2937;
  --hair:#334155;
  --text:#f8fafc;
  --muted:#cbd5e1;
  --accent:#22c55e;
  --link:#93c5fd;
  --danger:#ef4444;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  height:100%;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,Roboto,Arial,sans-serif;
  overscroll-behavior:none;
  color:var(--text);
}
.device{
  display:flex;
  flex-direction:column;
  height:100dvh;
  padding-top:var(--topbar-h);
}

.topbar{
  position:fixed;
  top:calc(var(--logo-h) + 56px);
  left:0;
  right:0;
  z-index:1200;
  background:var(--panel);
  border-bottom:1px solid var(--hair);
}
.topbar-inner{
  min-height:var(--topbar-h);
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:8px;
  padding:6px;
}
.icon-btn{
  width:34px;height:34px;
  display:grid;place-items:center;
  border-radius:10px;
  background:var(--panel2);
  border:1px solid var(--hair);
  cursor:pointer;
  font-size:15px;
  color:var(--text);
}
.header-icon{width:20px;height:20px;object-fit:contain;border-radius:4px;}
.date-box{
  text-align:center;
  font-weight:700;
  font-size:13px;
  line-height:1.15;
}
.date-box small{display:block;color:var(--muted);font-weight:600;margin-top:2px;}
.sort-stack{background:var(--panel);border:1px solid var(--hair);padding:4px;border-radius:10px;}
.sort-top{font-size:12px;font-weight:600;text-align:center;}
.sort-bottom{display:flex;gap:4px;margin-top:2px;}
.pill{
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  border:1px solid var(--hair);
  font-weight:600;
}
.pill.on{background:#14532d;border-color:#22c55e;color:var(--accent);}
.pill.lock{opacity:.65;}

body.map-view .map-wrap{top:calc(var(--logo-h) + var(--topbar-h) + var(--hint-h));}
body.map-view #groupSlot{display:none;}
.hint{
  position:sticky;top:calc(var(--logo-h) + var(--topbar-h));
  height:var(--hint-h);
  background:var(--panel);
  border-bottom:1px solid var(--hair);
  line-height:var(--hint-h);
  text-align:center;
  color:var(--muted);
  z-index:1150;
  font-size:13px;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}

.map-wrap{
  position:fixed;
  top:calc(var(--logo-h) + var(--topbar-h) + var(--hint-h));
  left:0;
  right:0;
  bottom:0;
  z-index:820;
  background:rgba(2,6,23,.92);
  display:none;
  padding:12px;
}
.map-wrap.open{display:block;}
.map-panel{
  position:relative;
  height:100%;
  border:1px solid var(--hair);
  border-radius:16px;
  overflow:hidden;
  background:var(--panel);
  box-shadow:0 18px 60px rgba(0,0,0,.45);
}
#map{
  height:100%;
  width:100%;
}
.map-close{display:none;}
.map-control{
  position:absolute;
  top:10px;
  right:10px;
  z-index:700;
  background:var(--panel);
  border:1px solid var(--hair);
  border-radius:10px;
  padding:8px 10px;
  box-shadow:0 2px 8px rgba(15,23,42,.15);
  font-size:13px;
  font-weight:700;
  display:flex;
  gap:7px;
  align-items:center;
}
.map-control input{width:16px;height:16px;}

.group-slot{
  position:sticky;
  top:calc(var(--topbar-h) + var(--hint-h));
  height:var(--slot-h);
  background:var(--panel);
  border-bottom:1px dashed var(--hair);
  z-index:800;
  font-weight:700;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 12px;
}
.group-sub{color:var(--muted);font-size:13px;}

.scroll{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

.arena-header{
  display:flex;
  justify-content:space-between;
  background:var(--panel);
  border-bottom:1px dashed var(--hair);
  padding:10px 12px;
  font-weight:700;
}
.arena-header small{
  display:block;
  color:var(--muted);
  font-weight:600;
  margin-top:2px;
}
.arena-header.active-hidden{
  height:0;
  padding:0;
  border:none;
  visibility:hidden;
}

.game{
  background:var(--panel);
  border-top:1px dashed var(--hair);
  padding:8px 12px;
}
.game-top{
  display:flex;
  align-items:center;
  gap:6px;
  white-space:nowrap;
}
.game-time{font-weight:800;}
.game-series{
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--link);
  font-weight:700;
  font-size:13px;
}
.game-bottom{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:8px;
  margin-top:5px;
}
.team{display:flex;align-items:center;gap:6px;min-width:0;}
.team-logo{
  width:26px;height:26px;
  border-radius:50%;
  border:1px solid var(--hair);
  object-fit:cover;
  background:var(--panel2);
  flex:0 0 auto;
}
.team-name{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  font-size:13px;
}
.team.home{justify-content:flex-end;}
.result.status-4{
  border:2px solid #d7f379 !important;
}
.result{
  font-weight:800;
  padding:2px 10px;
  border-radius:8px;
  border:1px solid var(--hair);
  background:var(--panel);
  white-space:nowrap;
}
.result.link{color:var(--link);background:#1e3a8a;border-color:#60a5fa;}
.divider{height:7px;background:var(--bg);border-top:1px dashed var(--hair);}
.empty{
  margin:18px;
  padding:18px;
  border-radius:14px;
  border:1px solid var(--hair);
  background:var(--panel);
  color:var(--muted);
  text-align:center;
  font-weight:700;
}
.leaflet-popup-content{font-size:13px;line-height:1.3;}
.field-label{
  background:rgba(0,0,0,.9);
  border:1px solid var(--hair);
  border-radius:4px;
  padding:2px 4px;
  font-size:12px;
  font-weight:700;
  color:var(--text);
  box-shadow:0 1px 3px rgba(0,0,0,.35);
}

.hint{
  z-index:1150 !important;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
}
body.map-view #groupSlot,
body.map-view .group-slot{
  display:none !important;
}

/* header2 fixed-only correction */

</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
function updateHeaderLayout(){
  const header1 = document.querySelector('.top-header');
  if(!header1) return;

  const h = Math.ceil(header1.getBoundingClientRect().height);

  document.documentElement.style.setProperty('--header1-height', `${h}px`);
}

window.addEventListener('resize', updateHeaderLayout);
window.addEventListener('orientationchange', updateHeaderLayout);

setTimeout(updateHeaderLayout, 0);
setTimeout(updateHeaderLayout, 100);
setTimeout(updateHeaderLayout, 500);

</script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
const DATA_URL = "./data/football_games.csv";
const CLUSTER_URL = "./data/FootballClustersEnhanced.csv";

// Default aktuell plats: Gamla Ullevi
const CURRENT_LOCATION = {
  name: "Gamla Ullevi",
  lat: 57.706411,
  lon: 11.980905
};

const REQUIRED = {
  date: "Datum",
  time: "Klockslag",
  series: "SerieNamn",
  seriesId: "SerieId",
  matchId: "MatchId",
  status: "MatchStatus",
  matchUrl: "MatchUrl",
  homeName: "HemmalagNamn",
  homeLogo: "HemmalagLogoUrl",
  awayName: "BortalagNamn",
  awayLogo: "BortalagLogoUrl",
  result: "MatchResultat",
  arenaName: "ArenaNamn",
  cluster: "ArenaKluster",
  address: "ArenaKlusterAdress",
  safe: "SäkerMapping",
  lat: "LS_Lat",
  lon: "LS_Long"
};

let allGames = [];
let allDates = [];
let selectedDate = "";
let currentArena = "";
let map = null;
let currentMarker = null;
let maxDistanceRing = null;
let arenaLayer = null;
let locationPickerCircle = null;
let locationPickerActive = false;
let clusterLocations = [];
let arenaHeaders = [];
let lastScrollTop = 0;

const scroll = document.getElementById("scrollArea");
const slot = document.getElementById("groupSlot");
const showAllArenas = document.getElementById("showAllArenas");

const SETTINGS_MAX_DISTANCE_KEY = "localsport_football_max_distance_km";
let maxDistanceKm = Number(localStorage.getItem(SETTINGS_MAX_DISTANCE_KEY) || "999999");

function distanceAllowed(game){
  if(maxDistanceKm >= 999999) return true;
  return haversineKm(CURRENT_LOCATION.lat, CURRENT_LOCATION.lon, game.lat, game.lon) <= maxDistanceKm;
}

function visibleGamesForSelectedDate(){
  return allGames.filter(g => g.date === selectedDate && distanceAllowed(g));
}

function syncSettingsPanel(){
  document.querySelectorAll('input[name="maxDistanceKm"]').forEach(input => {
    input.checked = Number(input.value) === Number(maxDistanceKm);
  });
}

const SETTINGS_LOCATION_KEY = "localsport_football_location_v1";
const DEFAULT_LOCATION = {
  type: "default",
  name: "Gamla Ullevi",
  lat: 57.706411,
  lon: 11.980905
};

function loadLocationSetting(){
  try{
    return JSON.parse(localStorage.getItem(SETTINGS_LOCATION_KEY) || "null") || DEFAULT_LOCATION;
  } catch(_err){
    return DEFAULT_LOCATION;
  }
}

function saveLocationSetting(value){
  localStorage.setItem(SETTINGS_LOCATION_KEY, JSON.stringify(value));
}

function applyCurrentLocation(value){
  CURRENT_LOCATION.name = value.name || "Min plats";
  CURRENT_LOCATION.lat = Number(value.lat);
  CURRENT_LOCATION.lon = Number(value.lon);

  if(currentMarker){
    currentMarker.setLatLng([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon]);
    currentMarker.bindPopup(`<b>${escapeHtml(CURRENT_LOCATION.name)}</b><br>Aktuell plats`);
  }

  updateMaxDistanceRing();
}

function updateMaxDistanceRing(){
  if(!map) return;

  if(maxDistanceRing){
    map.removeLayer(maxDistanceRing);
    maxDistanceRing = null;
  }

  if(maxDistanceKm >= 999999) return;

  maxDistanceRing = L.circle([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon], {
    radius: maxDistanceKm * 1000,
    color: "#dc2626",
    fillOpacity: 0,
    weight: 2
  }).addTo(map);
}


function looksLikeCoordinates(value){
  return /^\s*-?\d+(?:[.,]\d+)?\s*,\s*-?\d+(?:[.,]\d+)?\s*$/.test(String(value || ""));
}

function parseClusterCoordinate(value){
  const parts = String(value || "").split(",");
  if(parts.length < 2) return null;

  const lat = Number(parts[0].trim().replace(",", "."));
  const lon = Number(parts[1].trim().replace(",", "."));

  if(!Number.isFinite(lat) || !Number.isFinite(lon)) return null;
  return {lat, lon};
}

async function buildLocationOptions(){
  const byCluster = new Map();

  console.info(`[LocalSport] Läser fotbollskluster från ${CLUSTER_URL}`);

  try{
    const response = await fetch(CLUSTER_URL, { cache:"no-store" });
    console.info(`[LocalSport] ${CLUSTER_URL} status=${response.status} ok=${response.ok}`);

    if(response.ok){
      const text = await response.text();
      console.info(`[LocalSport] ${CLUSTER_URL} bytes=${text.length}`);

      const rows = parseCSV(text);
      console.info(`[LocalSport] ${CLUSTER_URL} rader=${rows.length}`);

      let parsedRows = 0;
      let skippedRows = 0;

      for(const row of rows){
        if(!row || row.length < 3){
          skippedRows++;
          continue;
        }

        // Stöd båda formaten:
        // 1) assIdLista;klusternamn;koordinater;adress;...
        // 2) assIdLista;?;klusternamn;koordinater;adress;...
        let clusterName = "";
        let coordText = "";
        let address = "";

        if(looksLikeCoordinates(row[2])){
          clusterName = (row[1] || "").trim();
          coordText = (row[2] || "").trim();
          address = (row[3] || "").trim();
        } else if(looksLikeCoordinates(row[3])){
          clusterName = (row[2] || "").trim();
          coordText = (row[3] || "").trim();
          address = (row[4] || "").trim();
        } else {
          skippedRows++;
          continue;
        }

        const coord = parseClusterCoordinate(coordText);
        if(!clusterName || !coord){
          skippedRows++;
          continue;
        }

        if(!byCluster.has(clusterName)){
          byCluster.set(clusterName, {
            type: "cluster",
            name: clusterName,
            lat: coord.lat,
            lon: coord.lon,
            address
          });
          parsedRows++;
        }
      }

      console.info(`[LocalSport] Kluster från fil: ${byCluster.size}, parsade=${parsedRows}, hoppade över=${skippedRows}`);
    }
  } catch(err){
    console.warn(`[LocalSport] Kunde inte läsa ${CLUSTER_URL}`, err);
  }

  if(byCluster.size === 0){
    console.warn("[LocalSport] Inga kluster kunde läsas från FootballClustersEnhanced.csv, använder fallback från football_games.csv");

    for(const game of allGames){
      if(!game.cluster || !Number.isFinite(game.lat) || !Number.isFinite(game.lon)) continue;

      if(!byCluster.has(game.cluster)){
        byCluster.set(game.cluster, {
          type: "cluster",
          name: game.cluster,
          lat: game.lat,
          lon: game.lon,
          address: game.address || ""
        });
      }
    }

    console.info(`[LocalSport] Fallback-kluster från matcher: ${byCluster.size}`);
  }

  clusterLocations = [...byCluster.values()].sort((a,b) => a.name.localeCompare(b.name, "sv"));

  const select = document.getElementById("locationSetting");
  if(!select) return;

  const saved = loadLocationSetting();
  const options = [
    `<option value="__default__">Gamla Ullevi</option>`,
    `<option value="__map__">Välj plats på kartan</option>`
  ];

  if(saved.type === "custom"){
    options.push(`<option value="__custom__">Min plats</option>`);
  }

  for(const item of clusterLocations){
    options.push(`<option value="${escapeHtml(item.name)}">${escapeHtml(item.name)}</option>`);
  }

  select.innerHTML = options.join("");

  if(saved.type === "map"){
    select.value = "__map__";
  } else if(saved.type === "custom"){
    select.value = "__custom__";
    applyCurrentLocation(saved);
  } else if(saved.type === "cluster"){
    const found = clusterLocations.find(item => item.name === saved.name);
    if(found){
      select.value = found.name;
      applyCurrentLocation(found);
    } else {
      select.value = "__default__";
      applyCurrentLocation(DEFAULT_LOCATION);
    }
  } else {
    select.value = "__default__";
    applyCurrentLocation(DEFAULT_LOCATION);
  }

  console.info(`[LocalSport] Positionslista klar: ${clusterLocations.length} kluster`);
}

function isLocationPickerSelected(){
  const select = document.getElementById("locationSetting");
  return select && select.value === "__map__";
}

function setNormalMapControl(){
  const label = document.querySelector(".map-control span");
  if(label) label.textContent = "Visa alla Arenor";
  showAllArenas.checked = false;
}

function setLocationPickerMapControl(){
  const label = document.querySelector(".map-control span");
  if(label) label.textContent = "Spara platsen";
  showAllArenas.checked = false;
}

function updateLocationPickerCircle(){
  if(!map || !locationPickerActive) return;

  const center = map.getCenter();
  if(!locationPickerCircle){
    locationPickerCircle = L.circle([center.lat, center.lng], {
      radius: 450,
      color: "#dc2626",
      fillColor: "#dc2626",
      fillOpacity: 0.25,
      weight: 3
    }).addTo(map);
  } else {
    locationPickerCircle.setLatLng([center.lat, center.lng]);
  }
}

function startLocationPickerMap(){
  if(!map) return;

  locationPickerActive = true;
  document.body.classList.add("location-picker-mode");
  setLocationPickerMapControl();

  if(arenaLayer) arenaLayer.clearLayers();
  if(currentMarker && map.hasLayer(currentMarker)) map.removeLayer(currentMarker);

  map.setMaxBounds([[55.0, 10.0], [69.5, 25.0]]);
  map.setMinZoom(4);

  updateLocationPickerCircle();
  map.off("move", updateLocationPickerCircle);
  map.on("move", updateLocationPickerCircle);
}

function stopLocationPickerMap(){
  locationPickerActive = false;
  document.body.classList.remove("location-picker-mode");
  if(map) map.off("move", updateLocationPickerCircle);

  if(locationPickerCircle){
    map.removeLayer(locationPickerCircle);
    locationPickerCircle = null;
  }

  if(map && currentMarker && !map.hasLayer(currentMarker)){
    currentMarker.addTo(map);
  }

  setNormalMapControl();
}

function saveLocationFromMapCenter(){
  if(!map) return;

  const center = map.getCenter();
  const value = {
    type: "custom",
    name: "Min plats",
    lat: center.lat,
    lon: center.lng
  };

  saveLocationSetting(value);

  buildLocationOptions();

  stopLocationPickerMap();

  const games = visibleGamesForSelectedDate();
  const arenas = groupByArena(games);
  renderList(arenas);
  renderMap(arenas, false);

function refreshOpenMapAfterLocationSettingChange(){
  if(!document.body.classList.contains("map-view") || !map){
    return;
  }

  setTimeout(() => {
    map.invalidateSize();

    if(isLocationPickerSelected()){
      startLocationPickerMap();

      stopLocationPickerMap();
      const games = visibleGamesForSelectedDate();
      const arenas = groupByArena(games);
      renderMap(arenas, true);
    }
  }, 50);
}


function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let quote = false;

  for(let i=0; i<text.length; i++){
    const ch = text[i];
    const next = text[i+1];

    if(ch === '"' && quote && next === '"'){
      cell += '"';
      i++;
    } else if(ch === '"'){
      quote = !quote;
    } else if(ch === ";" && !quote){
      row.push(cell);
      cell = "";
    } else if((ch === "\n" || ch === "\r") && !quote){
      if(ch === "\r" && next === "\n") i++;
      row.push(cell);
      if(row.some(v => v.trim() !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += ch;
    }
  }

  if(cell.length || row.length){
    row.push(cell);
    if(row.some(v => v.trim() !== "")) rows.push(row);
  }

  return rows;
}

function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLon = (lon2-lon1) * Math.PI/180;
  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtKm(km){
  if(km < 1) return `${Math.round(km*1000)} m`;
  if(km < 10) return `${km.toFixed(1)} km`;
  return `${Math.round(km)} km`;
}

function fmtDate(dateStr){
  const d = new Date(`${dateStr}T12:00:00`);
  if(Number.isNaN(d.getTime())) return {main: dateStr, sub: ""};

  const weekdays = ["Sön","Mån","Tis","Ons","Tors","Fre","Lör"];
  const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];

  return {
    main: weekdays[d.getDay()],
    sub: `${d.getDate()} ${months[d.getMonth()]}`
  };
}

function fmtRelativeDate(dateStr){
  const selected = new Date(`${dateStr}T12:00:00`);
  const today = new Date();
  const todayNoon = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 12, 0, 0);

  if(Number.isNaN(selected.getTime())) return "";

  const diffDays = Math.round((selected - todayNoon) / (24 * 60 * 60 * 1000));

  if(diffDays === 0) return "Idag";
  if(diffDays === -1) return "Igår";
  if(diffDays === 1) return "Imorgon";
  if(diffDays < 0) return `Dag ${diffDays}`;
  return `Dag +${diffDays}`;
}

function absoluteUrl(url){
  if(!url) return "#";
  if(url.startsWith("http://") || url.startsWith("https://")) return url;
  if(url.startsWith("/")) return "https://www.gbgfotboll.se" + url;
  return url;
}

function logo(url){
  const safe = url || "";
  return safe ? `<img class="team-logo" src="${escapeHtml(safe)}" onerror="this.style.visibility='hidden'">` : `<span class="team-logo"></span>`;
}

function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

function displayResult(result){
  const value = String(result || "").trim();
  if(!value || value === "-1--1" || value === "-1 - -1") return "–";
  if(value === "0-0" || value === "0 - 0") return "–";
  return value;
}

function groupByArena(games){
  const map = new Map();

  for(const game of games){
    const key = game.cluster || game.arenaName || "Okänd arena";
    if(!map.has(key)){
      const dist = haversineKm(CURRENT_LOCATION.lat, CURRENT_LOCATION.lon, game.lat, game.lon);
      map.set(key, {
        name: key,
        address: game.address,
        lat: game.lat,
        lon: game.lon,
        dist,
        games: []
      });
    }
    map.get(key).games.push(game);
  }

  return [...map.values()]
    .sort((a,b) => a.dist - b.dist || a.name.localeCompare(b.name, "sv"));
}

function render(){
  const {main, sub} = fmtDate(selectedDate);
  const dateRelLabel = document.getElementById("dateRelLabel");
  const relText = fmtRelativeDate(selectedDate);
  dateRelLabel.textContent = relText;
  dateRelLabel.classList.toggle("long", relText.length > 6);
  document.getElementById("dateLabel").textContent = main;
  document.getElementById("dateSubLabel").textContent = sub;

  const games = visibleGamesForSelectedDate()
    .sort((a,b) => {
      const da = haversineKm(CURRENT_LOCATION.lat, CURRENT_LOCATION.lon, a.lat, a.lon);
      const db = haversineKm(CURRENT_LOCATION.lat, CURRENT_LOCATION.lon, b.lat, b.lon);
      return da - db || a.time.localeCompare(b.time);
    });

  const arenas = groupByArena(games);
  renderList(arenas);
  renderMap(arenas);
  updateHint(games, arenas);
}

function renderList(arenas){
  scroll.innerHTML = "";

  if(!arenas.length){
    slot.querySelector(".group-title").textContent = "Inga matcher";
    slot.querySelector(".group-sub").textContent = "";
    scroll.innerHTML = `<div class="empty">Inga fotbollsmatcher hittades för valt datum.</div>`;
    arenaHeaders = [];
    return;
  }

  currentArena = arenas[0].name;
  slot.querySelector(".group-title").textContent = currentArena;
  slot.querySelector(".group-sub").textContent = fmtKm(arenas[0].dist);

  const frag = document.createDocumentFragment();

  for(const arena of arenas){
    const header = document.createElement("div");
    header.className = "arena-header";
    header.dataset.arenaHeader = arena.name;
    header.innerHTML = `
      <div>${escapeHtml(arena.name)}<small>${escapeHtml(arena.address || "")}</small></div>
      <div>${fmtKm(arena.dist)}</div>
    `;
    frag.appendChild(header);

    arena.games.sort((a,b) => a.time.localeCompare(b.time));

    for(const game of arena.games){
      const article = document.createElement("article");
      article.className = "game";
      article.dataset.arena = arena.name;
      article.dataset.time = game.time;

      const resultText = displayResult(game.result);
      const resultClass = (game.matchUrl ? "result link" : "result") + (game.status === "4" ? " status-4" : "");
      const resultHtml = game.matchUrl
        ? `<a href="${escapeHtml(absoluteUrl(game.matchUrl))}" style="color:inherit;text-decoration:none;">${escapeHtml(resultText)}</a>`
        : escapeHtml(resultText);

      article.innerHTML = `
        <div class="game-top">
          <div class="game-time">${escapeHtml(game.time)}</div>
          <div class="game-series"><a href="https://www.gbgfotboll.se/go-to/?ftid=${encodeURIComponent(game.seriesId || "")}" target="_blank" style="color:inherit;text-decoration:none;">${escapeHtml(game.series)}</a></div>
        </div>
        <div class="game-bottom">
          <div class="team home">
            <span class="team-name">${escapeHtml(game.homeName)}</span>
            ${logo(game.homeLogo)}
          </div>
          <div class="${resultClass}">${resultHtml}</div>
          <div class="team">
            ${logo(game.awayLogo)}
            <span class="team-name">${escapeHtml(game.awayName)}</span>
          </div>
        </div>
      `;
      frag.appendChild(article);
    }

    const divider = document.createElement("div");
    divider.className = "divider";
    frag.appendChild(divider);
  }

  scroll.appendChild(frag);
  arenaHeaders = [...scroll.querySelectorAll(".arena-header")];
  lastScrollTop = 0;
}

function updateHint(games, arenas){
  const hint = document.getElementById("hint");
  const locationName = CURRENT_LOCATION.name || "vald plats";

  if(!games.length){
    hint.textContent = `Inga fotbollsmatcher för valt datum och inom valt maxavstånd till ${locationName}`;
  } else {
    hint.textContent = `Visar ${games.length} matcher på ${arenas.length} arenor, sorterat på avstånd till ${locationName}`;
  }
}

function updateStickyArena(){
  if(!arenaHeaders.length) return;

  const st = scroll.scrollTop;
  const dir = (st > lastScrollTop) ? "down" : "up";
  lastScrollTop = st;

  const stickyBottom = slot.getBoundingClientRect().bottom;
  let active = arenaHeaders[0];

  for(const hdr of arenaHeaders){
    if(hdr.getBoundingClientRect().top <= stickyBottom + 1){
      active = hdr;
    }
  }

  const arenaName = active.dataset.arenaHeader;
  if(arenaName && arenaName !== currentArena){
    currentArena = arenaName;
    const sub = active.querySelector("div:last-child")?.textContent || "";
    slot.querySelector(".group-title").textContent = arenaName;
    slot.querySelector(".group-sub").textContent = sub;
  }
}

function initMap(){
  map = L.map("map", { zoomControl:true }).setView([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon], 11);
  map.setMaxBounds([[55.0, 10.0], [69.5, 25.0]]);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap"
  }).addTo(map);

  currentMarker = L.circle([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon], {
    radius: 450,
    color: "#dc2626",
    fillColor: "#dc2626",
    fillOpacity: 0.25,
    weight: 3
  }).addTo(map).bindPopup(`<b>${CURRENT_LOCATION.name}</b><br>Aktuell plats`);

  arenaLayer = L.markerClusterGroup({
    showCoverageOnHover:false,
    maxClusterRadius:46
  }).addTo(map);

  updateMaxDistanceRing();
}

function allKnownArenas(){
  const byCluster = new Map();

  for(const game of allGames){
    if(!game.cluster || !Number.isFinite(game.lat) || !Number.isFinite(game.lon)) continue;

    if(!byCluster.has(game.cluster)){
      byCluster.set(game.cluster, {
        name: game.cluster,
        address: game.address,
        lat: game.lat,
        lon: game.lon,
        active: false,
        games: 0
      });
    }
  }

  return [...byCluster.values()];
}

function renderMap(activeArenas, preserveView=false){
  if(!map || locationPickerActive) return;

  const previousCenter = map.getCenter();
  const previousZoom = map.getZoom();

  arenaLayer.clearLayers();
  updateMaxDistanceRing();

  const activeNames = new Set(activeArenas.map(a => a.name));
  const showAll = showAllArenas.checked;

  const arenas = showAll
    ? allKnownArenas().map(a => ({...a, active: activeNames.has(a.name)}))
    : activeArenas.map(a => ({...a, active:true, games:a.games.length}));

  const bounds = [[CURRENT_LOCATION.lat, CURRENT_LOCATION.lon]];

  for(const arena of arenas){
    if(!Number.isFinite(arena.lat) || !Number.isFinite(arena.lon)) continue;

    const color = arena.active ? "#16a34a" : "#64748b";
    const fillOpacity = arena.active ? 0.85 : 0.35;

    const marker = L.circleMarker([arena.lat, arena.lon], {
      radius: arena.active ? 7 : 5,
      color,
      fillColor: color,
      fillOpacity,
      weight: 2
    });

    const dist = fmtKm(haversineKm(CURRENT_LOCATION.lat, CURRENT_LOCATION.lon, arena.lat, arena.lon));
    const gamesText = arena.active ? `<br>${arena.games || 0} matcher valt datum` : `<br>Ingen match valt datum`;

    marker.bindPopup(`
      <b>${escapeHtml(arena.name)}</b><br>
      ${escapeHtml(arena.address || "")}<br>
      Avstånd: ${dist}
      ${gamesText}
    `);

    marker.bindTooltip(arena.name, {
      permanent:true,
      direction:"right",
      offset:[8,0],
      className:"field-label"
    });

    marker.addTo(arenaLayer);
    bounds.push([arena.lat, arena.lon]);
  }

  if(preserveView){
    map.setView(previousCenter, previousZoom, { animate:false });
  } else {
    map.setView([CURRENT_LOCATION.lat, CURRENT_LOCATION.lon], 11, { animate:false });
  }
}

async function loadGames(){
  const response = await fetch(DATA_URL, { cache:"no-store" });
  if(!response.ok) throw new Error(`Kunde inte läsa ${DATA_URL}: ${response.status}`);

  const text = await response.text();
  const rows = parseCSV(text);

  if(!rows.length) throw new Error("football_games.csv är tom");

  const header = rows[0].map(h => h.trim());
  const index = Object.fromEntries(header.map((h,i) => [h,i]));

  function col(row, name){
    const i = index[name];
    return i === undefined ? "" : (row[i] || "").trim();
  }

  allGames = rows.slice(1).map(row => {
    const lat = Number(col(row, REQUIRED.lat).replace(",", "."));
    const lon = Number(col(row, REQUIRED.lon).replace(",", "."));

    return {
      date: col(row, REQUIRED.date),
      time: col(row, REQUIRED.time),
      series: col(row, REQUIRED.series),
      seriesId: col(row, REQUIRED.seriesId),
      matchId: col(row, REQUIRED.matchId),
      status: col(row, REQUIRED.status),
      matchUrl: col(row, REQUIRED.matchUrl),
      homeName: col(row, REQUIRED.homeName),
      homeLogo: col(row, REQUIRED.homeLogo),
      awayName: col(row, REQUIRED.awayName),
      awayLogo: col(row, REQUIRED.awayLogo),
      result: col(row, REQUIRED.result),
      arenaName: col(row, REQUIRED.arenaName),
      cluster: col(row, REQUIRED.cluster),
      address: col(row, REQUIRED.address),
      safe: col(row, REQUIRED.safe),
      lat,
      lon
    };
  }).filter(g =>
    g.date &&
    g.time &&
    g.cluster &&
    Number.isFinite(g.lat) &&
    Number.isFinite(g.lon)
  );

  allDates = [...new Set(allGames.map(g => g.date))].sort();

  const today = new Date().toISOString().slice(0,10);
  selectedDate = allDates.includes(today) ? today : (allDates[0] || "");

  if(!selectedDate){
    throw new Error("Inga matcher med datum hittades");
  }
}

document.getElementById("prevDay").addEventListener("click", () => {
  const idx = allDates.indexOf(selectedDate);
  if(idx > 0){
    selectedDate = allDates[idx-1];
    render();
  }
});

document.getElementById("nextDay").addEventListener("click", () => {
  const idx = allDates.indexOf(selectedDate);
  if(idx >= 0 && idx < allDates.length-1){
    selectedDate = allDates[idx+1];
    render();
  }
});

document.getElementById("locationSetting").addEventListener("change", (ev) => {
  const value = ev.target.value;

  if(value === "__map__"){
    // Spara inte över den senast fungerande platsen förrän användaren klickar "Spara platsen".
    refreshOpenMapAfterLocationSettingChange();
    return;
  }

  if(value === "__default__"){
    saveLocationSetting(DEFAULT_LOCATION);
    applyCurrentLocation(DEFAULT_LOCATION);
    render();
    refreshOpenMapAfterLocationSettingChange();
    return;
  }

  if(value === "__custom__"){
    const saved = loadLocationSetting();
    applyCurrentLocation(saved);
    render();
    refreshOpenMapAfterLocationSettingChange();
    return;
  }

  const cluster = clusterLocations.find(item => item.name === value);
  if(cluster){
    const saved = {
      type: "cluster",
      name: cluster.name,
      lat: cluster.lat,
      lon: cluster.lon,
      address: cluster.address || ""
    };
    saveLocationSetting(saved);
    applyCurrentLocation(saved);
    render();
    refreshOpenMapAfterLocationSettingChange();
  }
});

document.getElementById("settingsBtn").addEventListener("click", (ev) => {
  ev.preventDefault();
  ev.stopPropagation();
  syncSettingsPanel();
  const panel = document.getElementById("settingsPanel");
  panel.classList.toggle("open");
  panel.setAttribute("aria-hidden", panel.classList.contains("open") ? "false" : "true");
});

document.getElementById("settingsPanel").addEventListener("click", (ev) => {
  ev.stopPropagation();
});

document.addEventListener("click", () => {
  const panel = document.getElementById("settingsPanel");
  panel.classList.remove("open");
  panel.setAttribute("aria-hidden", "true");
});

document.querySelectorAll('input[name="maxDistanceKm"]').forEach(input => {
  input.addEventListener("change", () => {
    maxDistanceKm = Number(input.value);
    localStorage.setItem(SETTINGS_MAX_DISTANCE_KEY, String(maxDistanceKm));
    updateMaxDistanceRing();
    document.getElementById("settingsPanel").classList.remove("open");
    render();
  });
});

syncSettingsPanel();

showAllArenas.addEventListener("change", () => {
  if(locationPickerActive){
    saveLocationFromMapCenter();
    return;
  }

  const games = visibleGamesForSelectedDate();
  const arenas = groupByArena(games);
  renderMap(arenas, true);
});
scroll.addEventListener("scroll", updateStickyArena, { passive:true });

(async function boot(){
  try{
    initMap();
    await loadGames();
    await buildLocationOptions();
    render();
  } catch(err){
    console.error(err);
    document.getElementById("hint").textContent = "Kunde inte läsa football_games.csv";
    scroll.innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
    slot.querySelector(".group-title").textContent = "Fel";
    slot.querySelector(".group-sub").textContent = "";
  }
})();
