name: FetchAndPresentEpRosters

permissions:
  contents: write
  pages: write
  id-token: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

concurrency:
  group: fetch-and-present-ep-rosters
  cancel-in-progress: false

jobs:
  fetch-and-present:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run getTeamRosters
        run: |
          export TZ=Europe/Stockholm
          python3 ./scripts/getTeamRosters.py \
            -tf ./ep_rosters/lag_2026_2027.txt \
            -od ./ep_rosters/output \
            -s 2026-2027

      - name: Run makeTeamCatalog
        run: |
          export TZ=Europe/Stockholm
          python3 ./scripts/makeTeamCatalog.py \
            -o ./SeriesAndTeams.html \
            -tf ./ep_rosters/lag_2026_2027.txt \
            -if ./ep_rosters/output \
            -s 2026-2027 \
            -sf ./ep_rosters/serier_logos.txt \
            -lp ./logos/ \
            -lp_script ./logos

      - name: Commit and push generated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ./SeriesAndTeams.html ./ep_rosters/output

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update EP rosters and catalog"

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p _site
          cp SeriesAndTeams.html _site/SeriesAndTeams.html
          cp SeriesAndTeams.html _site/index.html

          if [[ -d logos ]]; then
            cp -R logos _site/logos
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: fetch-and-present
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
