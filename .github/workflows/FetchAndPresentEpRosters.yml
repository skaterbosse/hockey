name: FetchAndPresentEpRosters

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "35 14 * * *"
    - cron: "35 15 * * *"

concurrency:
  group: fetch-and-present-ep-rosters
  cancel-in-progress: false

jobs:
  fetch-and-present:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Debug time
        shell: bash
        run: |
          echo "UTC:"
          date -u
          echo "Stockholm:"
          TZ=Europe/Stockholm date

      - name: Decide whether this UTC trigger matches Stockholm schedule
        id: stockholm_gate
        shell: bash
        run: |
          export TZ=Europe/Stockholm

          local_dow="$(date +%u)"   # 1=Mon ... 7=Sun
          local_hm="$(date +%H:%M)"

          echo "Stockholm local weekday=$local_dow"
          echo "Stockholm local time=$local_hm"

          should_run=false

          if [[ "$local_hm" == "16:35" ]]; then
            should_run=true
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Stop if this trigger is only a DST coverage slot
        if: github.event_name == 'schedule' && steps.stockholm_gate.outputs.should_run != 'true'
        run: |
          echo "This scheduled UTC slot does not correspond to a wanted Stockholm local time. Exiting."
          exit 0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run getTeamRosters
        run: |
          export TZ=Europe/Stockholm
          python3 ./scripts/getTeamRosters.py \
            -tf ./ep_rosters/lag_2026_2027.txt \
            -od ./ep_rosters/output \
            -s 2026-2027

      - name: Run makeTeamCatalog
        run: |
          export TZ=Europe/Stockholm
          python3 ./scripts/makeTeamCatalog.py \
            -o ./SeriesAndTeams.html \
            -tf ./ep_rosters/lag_2026_2027.txt \
            -if ./ep_rosters/output \
            -s 2026-2027 \
            -sf ./ep_rosters/serier_logos.txt \
            -lp ./logos/ \
            -lp_script ./logos

      - name: Commit and push generated files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ./SeriesAndTeams.html ./ep_rosters/output

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update EP rosters and catalog"

          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
