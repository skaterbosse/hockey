name: DeployPagesOnly

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        shell: bash
        run: |
          mkdir -p _site
          cp SeriesAndTeams.html _site/SeriesAndTeams.html

          if [[ -f index.html ]]; then
            cp index.html _site/index.html
          fi

          if [[ -d icons ]]; then
            cp -R icons _site/icons
          fi

          if [[ -d logos ]]; then
            cp -R logos _site/logos
          fi

          if [[ -f LocalSports.html ]]; then
            cp LocalSports.html _site/LocalSports.html
          fi
          
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  publish:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
