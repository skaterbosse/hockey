name: PresentHighlights

on:
  workflow_dispatch:
    inputs:
      force_online:
        description: 'Force online update for all leagues (-fo)'
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '10 5,6,7,20,21,22,23 * * 1-5'
      timezone: 'Europe/Stockholm'
    - cron: '10 0,7,8,9,18,19,20,21,22,23 * * 0,6'
      timezone: 'Europe/Stockholm'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/showHighlights.py

      - name: Capture previous HTML hash
        id: before
        shell: bash
        run: |
          if [[ -f highlights.html ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(sha256sum highlights.html | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate highlights HTML
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force_online }}" == "true" ]]; then
            EXTRA_ARGS="-fo"
          fi
          python3 scripts/showHighlights.py -l ./highlights/Leagues.txt -sd ./scripts -ld ./logos -od ./highlights/output -oh highlights.html -dbg $EXTRA_ARGS

      - name: Decide whether HTML changed
        id: decide
        shell: bash
        run: |
          if [[ ! -f highlights.html ]]; then
            echo "html_changed=false" >> "$GITHUB_OUTPUT"
            echo "No HTML file generated. Exiting without commit."
            exit 0
          fi

          AFTER_SHA="$(sha256sum highlights.html | awk '{print $1}')"
          BEFORE_SHA="${{ steps.before.outputs.sha }}"
          BEFORE_EXISTS="${{ steps.before.outputs.exists }}"

          if [[ "$BEFORE_EXISTS" == "true" && "$BEFORE_SHA" == "$AFTER_SHA" ]]; then
            echo "html_changed=false" >> "$GITHUB_OUTPUT"
            echo "HTML unchanged. Exiting without commit."
            exit 0
          fi

          echo "html_changed=true" >> "$GITHUB_OUTPUT"

      - name: Configure GitHub Pages
        if: steps.decide.outputs.html_changed == 'true'
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        if: steps.decide.outputs.html_changed == 'true'
        shell: bash
        run: |
          mkdir -p _site
          cp highlights.html _site/highlights.html

          if [[ -f index.html ]]; then
            cp index.html _site/index.html
          else
            cp highlights.html _site/index.html
          fi

          if [[ -d icons ]]; then
            cp -R icons _site/icons
          fi

          if [[ -d logos ]]; then
            cp -R logos _site/logos
          fi

          if [[ -f SeriesAndTeams.html ]]; then
            cp SeriesAndTeams.html _site/SeriesAndTeams.html
          fi

          if [[ -f OS_Milano_2026_TV-tider.html ]]; then
            cp OS_Milano_2026_TV-tider.html _site/OS_Milano_2026_TV-tider.html
          fi

      - name: Upload Pages artifact
        if: steps.decide.outputs.html_changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Commit and push generated files
        if: steps.decide.outputs.html_changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          git commit -m "Update highlights"
          git push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
